# Hopper-v2 medium dataset config
# Reference numbers from Decision Transformer paper

env_name: "Hopper-v5"               # gymnasium env (for evaluation)
dataset_id: "mujoco/hopper/medium-v0" # Minari dataset ID

# Model
state_dim: 11
act_dim: 3
hidden_size: 128
n_layer: 3
n_head: 1
dropout: 0.1
context_len: 20        # K in the paper

# Training
batch_size: 64
max_steps: 100000     # gradient steps (paper §A.1); overrides n_epochs
n_epochs: 10          # fallback if max_steps not set
lr: 1.0e-4
weight_decay: 1.0e-4
warmup_steps: 10000   # linear LR warmup (paper §A.1)

# Evaluation
target_return: 3600    # target cumulative return at inference time (raw, pre-scale)
rtg_scale: 1000        # divide RTG by this before feeding to model (paper §A.1)

# D4RL normalized score references (Hopper-v2)
ref_min_score: 20.272305
ref_max_score: 3234.3
